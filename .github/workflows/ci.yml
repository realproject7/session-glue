name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: py${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Never cancel siblings on a single failure: we want the full matrix
      # result — especially Windows, which has not been exercised before.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        # The [dev] extra pulls in pytest, ruff, build, and hatchling. Installing
        # build + hatchling is what lets the wheel/sdist packaging tests in
        # tests/test_package_assets.py run instead of skipping.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Test (pytest)
        run: python -m pytest
